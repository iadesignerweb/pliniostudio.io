<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLINIO STUDIO | Anatomia Holográfica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #02050a; color: #fff; font-family: 'Inter', sans-serif; 
            overflow: hidden; display: flex; flex-direction: column; 
            height: 100vh; justify-content: space-between; 
        }
        
        /* Fundo 3D */
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        canvas { display: block; }
        
        /* TOPO: Informações Fixas (Não sobrepõe) */
        .top-hud { 
            position: relative; z-index: 10; background: rgba(10,15,30,0.85); 
            backdrop-filter: blur(10px); padding: 15px; border-bottom: 1px solid rgba(0,255,179,0.2); 
            text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .badge { font-size: 0.65rem; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .title { font-size: 1.3rem; font-weight: 800; color: #00ffb3; text-transform: uppercase; margin-bottom: 8px; transition: color 0.3s; }
        .desc { font-size: 0.85rem; color: #a0aabf; line-height: 1.4; max-width: 500px; margin: 0 auto; }
        
        /* Caixas de Dados */
        .stats-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .stat-box { 
            background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 6px; 
            font-size: 0.75rem; border: 1px dashed rgba(255,255,255,0.1); 
        }
        .stat-box span { color: #888; display: block; font-size: 0.65rem; text-transform: uppercase; margin-bottom: 2px; }
        .stat-box strong { color: #fff; }

        /* MEIO: Espaço Visual (Onde a mágica acontece) */
        .middle-space { flex-grow: 1; position: relative; z-index: 5; }

        /* BASE: Controles Fixos (Fáceis para o polegar no mobile) */
        .bottom-hud { 
            position: relative; z-index: 10; padding: 15px; 
            background: linear-gradient(to top, #02050a 70%, transparent); 
            display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; 
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .bottom-hud::-webkit-scrollbar { display: none; }
        
        .btn-sys { 
            flex: 1; min-width: 105px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px 10px; 
            border-radius: 12px; font-size: 0.75rem; font-weight: 700; text-align: center; 
            cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; 
            align-items: center; gap: 6px; 
        }
        .btn-sys.active { transform: translateY(-4px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="canvas-container"><canvas id="neural-canvas"></canvas></div>
    
    <div class="top-hud">
        <div class="badge">MÓDULO ANATÔMICO 3D</div>
        <div class="title" id="info-title">SISTEMA NERVOSO</div>
        <div class="desc" id="info-desc">A rede de comunicação do corpo. Processa bilhões de sinais por segundo.</div>
        <div class="stats-container" id="info-stats">
            </div>
    </div>

    <div class="middle-space"></div>

    <div class="bottom-hud">
        <div class="btn-sys active" id="btn-nervous" onclick="changeSystem('nervous', this)"><span style="font-size:1.4rem">🧠</span> Nervoso</div>
        <div class="btn-sys" onclick="changeSystem('frontal', this)"><span style="font-size:1.4rem">⚡</span> Frontal</div>
        <div class="btn-sys" onclick="changeSystem('occipital', this)"><span style="font-size:1.4rem">👁️</span> Occipital</div>
        <div class="btn-sys" onclick="changeSystem('parietal', this)"><span style="font-size:1.4rem">✋</span> Parietal</div>
    </div>

    <script>
        const anatomyData = {
            nervous: { title: "Sistema Nervoso (Neon)", color: "#0096ff", desc: "A rede de comunicação do corpo. Processa bilhões de sinais por segundo.", stats: { "Velocidade": "430 km/h", "Neurônios": "86 Bilhões" }, particleMode: 'spread' },
            frontal: { title: "Lobo Frontal", color: "#ffc800", desc: "Responsável pelo planejamento complexo, raciocínio e movimentos.", stats: { "Função": "Decisão", "Local": "Frente" }, particleMode: 'focus_top' },
            occipital: { title: "Lobo Occipital", color: "#ff3232", desc: "O centro de processamento visual do cérebro. Decodifica imagens e cores.", stats: { "Função": "Visão", "Local": "Traseira" }, particleMode: 'focus_back' },
            parietal: { title: "Lobo Parietal", color: "#00ffb3", desc: "O centro de percepção espacial e sensorial. Processa toque e localização.", stats: { "Função": "Sensores", "Local": "Topo" }, particleMode: 'focus_middle' }
        };

        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [], currentColor = '#0096ff', currentTargetMode = 'spread';

        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor() { this.reset(); }
            reset() { this.x = Math.random()*width; this.y = Math.random()*height; this.vx = (Math.random()-0.5); this.vy = (Math.random()-0.5); this.size = Math.random()*2+1; }
            update(mode) {
                this.x += this.vx; this.y += this.vy;
                let tx = width/2, ty = height/2, p = 0;
                
                // Puxa as partículas pro centro do espaço livre
                if(mode==='focus_top'){ ty=height*0.35; p=0.05; } 
                else if(mode==='focus_back'){ tx=width*0.7; ty=height*0.55; p=0.05; } 
                else if(mode==='focus_middle'){ tx=width/2; ty=height*0.45; p=0.04; }
                
                if(mode!=='spread'){ 
                    this.vx += (tx-this.x)*p*0.01; this.vy += (ty-this.y)*p*0.01; 
                    this.vx *= 0.94; this.vy *= 0.94; 
                } else { 
                    if(this.x<0||this.x>width)this.vx*=-1; 
                    if(this.y<0||this.y>height)this.vy*=-1; 
                }
            }
            draw() { 
                ctx.fillStyle=currentColor; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); 
                ctx.shadowBlur=12; ctx.shadowColor=currentColor; 
            }
        }

        for(let i=0;i<60;i++) particles.push(new Particle()); // Reduzido para fluidez mobile

        function animate() {
            ctx.fillStyle = 'rgba(2,5,10,0.3)'; ctx.fillRect(0,0,width,height);
            for(let i=0;i<particles.length;i++){
                particles[i].update(currentTargetMode); particles[i].draw();
                for(let j=i;j<particles.length;j++){
                    let dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y, d=Math.sqrt(dx*dx+dy*dy);
                    if(d<90){ 
                        ctx.beginPath(); ctx.strokeStyle=currentColor; ctx.globalAlpha=1-(d/90); 
                        ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.stroke(); ctx.globalAlpha=1; 
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        function changeSystem(k, btn) {
            // Limpa os botões
            document.querySelectorAll('.btn-sys').forEach(b => {
                b.classList.remove('active');
                b.style.borderColor = 'rgba(255,255,255,0.1)';
                b.style.color = '#fff';
            });
            
            const d = anatomyData[k]; 
            currentColor = d.color; currentTargetMode = d.particleMode;
            
            // Ativa o botão clicado
            btn.classList.add('active');
            btn.style.borderColor = d.color;
            btn.style.color = d.color;
            
            // Atualiza os textos do Topo
            document.getElementById('info-title').innerText = d.title; 
            document.getElementById('info-title').style.color = d.color;
            document.getElementById('info-desc').innerText = d.desc;
            
            let s=''; 
            for(const [key,val] of Object.entries(d.stats)) {
                s+=`<div class="stat-box"><span>${key}</span><strong>${val}</strong></div>`;
            }
            document.getElementById('info-stats').innerHTML = s;
        }

        animate(); changeSystem('nervous', document.getElementById('btn-nervous'));
    </script>
</body>
</html>
