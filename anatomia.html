<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLINIO STUDIO | Anatomia Holográfica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #02050a; font-family: 'Inter', sans-serif; color: #fff; touch-action: none; }
        
        #neural-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Painéis de Vidro (Glassmorphism) */
        .glass-panel { 
            background: rgba(10, 15, 30, 0.85); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(0, 255, 179, 0.2); 
            border-radius: 12px; 
            position: absolute; 
            z-index: 10; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.8); 
        }
        
        /* --- AJUSTES MOBILE FIRST --- */
        .header { 
            top: 15px; left: 50%; transform: translateX(-50%); width: 90%; 
            padding: 12px; display: flex; flex-direction: column; align-items: center; 
            gap: 6px; text-align: center; 
        }
        .title-glow { font-size: 1rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: #00ffb3; margin: 0; }
        .status-dot { display: inline-block; width: 8px; height: 8px; background: #00ffb3; border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
        
        /* Painel de Informação (Centralizado no Mobile) */
        .info-panel { 
            top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 90%; max-width: 320px; padding: 18px; 
            display: none; animation: fadeIn 0.3s ease-out forwards; 
        }
        .info-panel h2 { font-size: 1.2rem; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }
        .info-panel p { font-size: 0.85rem; color: #a0aabf; line-height: 1.5; margin-bottom: 12px; }
        .data-row { display: flex; justify-content: space-between; font-size: 0.8rem; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 8px; margin-top: 8px; }

        /* Controles Inferiores */
        .controls { 
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); 
            width: 95%; display: flex; gap: 8px; overflow-x: auto; 
            padding-bottom: 5px; scrollbar-width: none; z-index: 20; 
        }
        .controls::-webkit-scrollbar { display: none; }
        .btn-system { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
            color: #fff; padding: 10px 12px; border-radius: 10px; cursor: pointer; 
            font-weight: 600; font-size: 0.8rem; white-space: nowrap; transition: 0.3s; 
            display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; min-width: 110px; 
        }
        
        /* Cores Ativas dos Botões */
        .btn-system.active { background: rgba(0, 255, 179, 0.15); border-color: #00ffb3; color: #00ffb3; transform: translateY(-2px); }
        .btn-system.color-blue.active { border-color: #0096ff; color: #0096ff; background: rgba(0, 150, 255, 0.15); }
        .btn-system.color-yellow.active { border-color: #ffc800; color: #ffc800; background: rgba(255, 200, 0, 0.15); }
        .btn-system.color-red.active { border-color: #ff3232; color: #ff3232; background: rgba(255, 50, 50, 0.15); }

        /* Animações */
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -45%); } to { opacity: 1; transform: translate(-50%, -50%); } }
        
        /* Ajustes Finos para Computador (Caso abram na tela grande) */
        @media(min-width: 768px) {
            .header { flex-direction: row; padding: 15px 25px; top: 20px; width: 90%; max-width: 800px; }
            .title-glow { font-size: 1.2rem; }
            .info-panel { top: 100px; right: 20px; left: auto; transform: none; width: 320px; animation: slideIn 0.4s ease-out forwards; }
            @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        }
    </style>
</head>
<body>
    
    <canvas id="neural-canvas"></canvas>
    
    <div class="glass-panel header">
        <div>
            <h1 class="title-glow">MÓDULO ANATÔMICO 3D</h1>
            <div style="font-size: 10px; color: #888; margin-top: 4px; letter-spacing: 1px;">METODOLOGIA PLÍNIO STUDIO</div>
        </div>
        <div style="font-size: 11px; color: #aaa; display: flex; align-items: center; margin-top: 5px;">
            <span class="status-dot" id="status-indicator"></span> <span id="status-text">Escaneamento Ativo</span>
        </div>
    </div>
    
    <div class="glass-panel info-panel" id="info-box">
        <h2 id="info-title" style="color: #00ffb3;">Visão Geral</h2>
        <p id="info-desc">Selecione um sistema abaixo para isolar as funções e iniciar a simulação holográfica.</p>
        <div id="info-stats"></div>
    </div>
    
    <div class="controls">
        <div class="btn-system active color-blue" onclick="changeSystem('nervous', this)"><span style="font-size: 18px;">🧠</span> Sist. Nervoso</div>
        <div class="btn-system color-yellow" onclick="changeSystem('frontal', this)"><span style="font-size: 18px;">⚡</span> Lobo Frontal</div>
        <div class="btn-system color-red" onclick="changeSystem('occipital', this)"><span style="font-size: 18px;">👁️</span> Lobo Occipital</div>
        <div class="btn-system" style="border-color: #00ffb3; color: #00ffb3;" onclick="changeSystem('parietal', this)"><span style="font-size: 18px;">✋</span> Lobo Parietal</div>
    </div>

    <script>
        const anatomyData = {
            nervous: { title: "Sistema Nervoso (Neon)", color: "#0096ff", desc: "A rede de comunicação do corpo. O cérebro e os nervos processam bilhões de sinais por segundo.", stats: { "Velocidade": "430 km/h", "Neurônios": "86 Bilhões" }, particleMode: 'spread' },
            frontal: { title: "Lobo Frontal", color: "#ffc800", desc: "Responsável pelo planejamento complexo, tomada de decisões e movimentos voluntários.", stats: { "Função": "Raciocínio", "Localização": "Frente" }, particleMode: 'focus_top' },
            occipital: { title: "Lobo Occipital", color: "#ff3232", desc: "O centro de processamento visual do cérebro. Decodifica imagens e cores.", stats: { "Função": "Visão", "Localização": "Traseira" }, particleMode: 'focus_back' },
            parietal: { title: "Lobo Parietal", color: "#00ffb3", desc: "O centro de percepção espacial e sensorial. Processa toque e temperatura.", stats: { "Função": "Sensores", "Localização": "Topo" }, particleMode: 'focus_middle' }
        };

        const canvas = document.getElementById('neural-canvas'), ctx = canvas.getContext('2d');
        let width, height, particles = [], currentColor = '#0096ff', currentTargetMode = 'spread';

        function resize() { 
            width = canvas.width = window.innerWidth; 
            height = canvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', resize); 
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() { 
                this.x = Math.random()*width; 
                this.y = Math.random()*height; 
                this.vx = (Math.random()-0.5); 
                this.vy = (Math.random()-0.5); 
                this.size = Math.random()*2+1; 
            }
            update(mode) {
                this.x += this.vx; this.y += this.vy;
                let tx = width/2, ty = height/2, p = 0;
                
                if(mode==='focus_top'){ ty=height*0.25; p=0.04; } 
                else if(mode==='focus_back'){ tx=width*0.7; ty=height*0.6; p=0.04; } 
                else if(mode==='focus_middle'){ tx=width/2; ty=height*0.4; p=0.03; }
                
                if(mode!=='spread'){ 
                    this.vx += (tx-this.x)*p*0.01; 
                    this.vy += (ty-this.y)*p*0.01; 
                    this.vx *= 0.94; this.vy *= 0.94; 
                } else { 
                    if(this.x<0||this.x>width)this.vx*=-1; 
                    if(this.y<0||this.y>height)this.vy*=-1; 
                }
            }
            draw() { 
                ctx.fillStyle=currentColor; 
                ctx.beginPath(); 
                ctx.arc(this.x,this.y,this.size,0,Math.PI*2); 
                ctx.fill(); 
                ctx.shadowBlur=10; ctx.shadowColor=currentColor; 
            }
        }

        // Reduzido para 70 partículas para ficar mais leve no celular e não manchar
        for(let i=0;i<70;i++) particles.push(new Particle());

        function animate() {
            // Fundo um pouco mais escuro para apagar as partículas antigas
            ctx.fillStyle = 'rgba(2,5,10,0.4)'; 
            ctx.fillRect(0,0,width,height);
            
            for(let i=0;i<particles.length;i++){
                particles[i].update(currentTargetMode); particles[i].draw();
                for(let j=i;j<particles.length;j++){
                    let dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y, d=Math.sqrt(dx*dx+dy*dy);
                    if(d<90){ 
                        ctx.beginPath(); 
                        ctx.strokeStyle=currentColor; 
                        ctx.globalAlpha=1-(d/90); 
                        ctx.moveTo(particles[i].x,particles[i].y); 
                        ctx.lineTo(particles[j].x,particles[j].y); 
                        ctx.stroke(); 
                        ctx.globalAlpha=1; 
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        function changeSystem(k, btn) {
            document.querySelectorAll('.btn-system').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
            const d = anatomyData[k]; 
            currentColor=d.color; currentTargetMode=d.particleMode;
            
            document.getElementById('status-indicator').style.background=d.color;
            const box = document.getElementById('info-box'); box.style.display='block';
            
            // Reinicia a animação do painel
            box.style.animation = 'none';
            box.offsetHeight; /* trigger reflow */
            box.style.animation = 'fadeIn 0.3s ease-out forwards';
            
            document.getElementById('info-title').innerText=d.title; 
            document.getElementById('info-title').style.color=d.color;
            document.getElementById('info-desc').innerText=d.desc;
            
            let s=''; 
            for(const [key,val] of Object.entries(d.stats)) {
                s+=`<div class="data-row"><span>${key}</span><strong>${val}</strong></div>`;
            }
            document.getElementById('info-stats').innerHTML=s;
        }

        animate(); changeSystem('nervous', document.querySelector('.btn-system'));
    </script>
</body>
</html>
