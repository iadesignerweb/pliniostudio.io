<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLINIO STUDIO | Anatomia 3D Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- RESET GERAL --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #02050a; color: #fff; font-family: 'Inter', sans-serif; 
            overflow: hidden; display: flex; flex-direction: column; 
            height: 100vh; width: 100vw;
        }
        
        /* ÁREA DO 3D - CENTRALIZADA E INTERATIVA */
        .middle-space { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; z-index: 1;
            display: flex; align-items: center; justify-content: center;
        }
        
        /* Ajuste do Iframe para Mobile */
        .middle-space iframe {
            width: 100%; height: 100%; border: none;
            pointer-events: auto; /* Garante que o toque passe para o 3D */
        }

        /* HUD SUPERIOR */
        .top-hud { 
            position: relative; z-index: 10; background: rgba(10,15,30,0.9); 
            backdrop-filter: blur(15px); padding: 15px; border-bottom: 1px solid rgba(0,255,179,0.3); 
            text-align: center;
        }
        .badge { font-size: 0.65rem; color: #00ffb3; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; font-weight: 800; }
        .title { font-size: 1.2rem; font-weight: 800; color: #fff; text-transform: uppercase; margin-bottom: 5px; }
        .desc { font-size: 0.8rem; color: #a0aabf; line-height: 1.3; max-width: 90%; margin: 0 auto; }

        /* HUD INFERIOR */
        .bottom-hud { 
            position: relative; z-index: 10; padding: 15px 10px; 
            background: linear-gradient(to top, #02050a 90%, transparent); 
            display: flex; gap: 8px; overflow-x: auto; 
            scrollbar-width: none; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .bottom-hud::-webkit-scrollbar { display: none; }
        
        .btn-sys { 
            flex: 1; min-width: 100px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px 5px; 
            border-radius: 12px; font-size: 0.7rem; font-weight: 700; text-align: center; 
            display: flex; flex-direction: column; align-items: center; gap: 5px; 
            transition: 0.3s;
        }
        .btn-sys.active { border-color: #00ffb3; background: rgba(0,255,179,0.1); color: #00ffb3; transform: translateY(-3px); }
    </style>
</head>
<body>
    
    <div class="top-hud">
        <div class="badge">Metodologia Plínio Studio</div>
        <div class="title" id="info-title">CÉREBRO HUMANO</div>
        <div class="desc" id="info-desc">Toque no ícone de "Play" para carregar e use o dedo para girar o modelo em 3D.</div>
    </div>

    <div class="middle-space">
        <iframe title="Modelo 3D Interativo" id="modelo-3d" 
                src="https://sketchfab.com/models/19433d0807d7423f967586ba89921540/embed?ui_infos=0&ui_watermark=0&ui_help=0&ui_settings=0&ui_inspector=0&transparent=1" 
                allow="autoplay; fullscreen; vr" 
                allowfullscreen>
        </iframe>
    </div>

    <div class="bottom-hud">
        <div class="btn-sys active" id="btn-cerebro" onclick="changeSystem('cerebro', this)">
            <span style="font-size:1.3rem">🧠</span> Cérebro
        </div>
        <div class="btn-sys" onclick="changeSystem('olho', this)">
            <span style="font-size:1.3rem">👁️</span> Olho
        </div>
        <div class="btn-sys" onclick="changeSystem('coracao', this)">
            <span style="font-size:1.3rem">🫀</span> Coração
        </div>
    </div>

    <script>
        const anatomyData = {
            cerebro: { 
                title: "CÉREBRO HUMANO", 
                color: "#00ffb3", 
                desc: "Explore a estrutura cerebral em 360°. Use dois dedos para dar zoom.", 
                url3d: "https://sketchfab.com/models/19433d0807d7423f967586ba89921540/embed?ui_infos=0&ui_watermark=0&transparent=1" 
            },
            olho: { 
                title: "ANATOMIA OCULAR", 
                color: "#ffc800", 
                desc: "Visualize o globo ocular e os nervos ópticos em detalhes realistas.", 
                url3d: "https://sketchfab.com/models/1baff7351f9a4976a66f73390038c0e0/embed?ui_infos=0&ui_watermark=0&transparent=1" 
            },
            coracao: { 
                title: "MOTOR CARDÍACO", 
                color: "#ff3232", 
                desc: "Análise da estrutura muscular e válvulas do coração humano.", 
                url3d: "https://sketchfab.com/models/6ff87eb903444f5b9fa30b3da5bc8f72/embed?ui_infos=0&ui_watermark=0&transparent=1" 
            }
        };

        function changeSystem(k, btn) {
            document.querySelectorAll('.btn-sys').forEach(b => b.classList.remove('active'));
            const d = anatomyData[k]; 
            btn.classList.add('active');
            
            document.getElementById('info-title').innerText = d.title; 
            document.getElementById('info-title').style.color = d.color;
            document.getElementById('info-desc').innerText = d.desc;
            document.getElementById('modelo-3d').src = d.url3d;
        }
    </script>
</body>
</html>
