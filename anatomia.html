<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLINIO STUDIO | Anatomia 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #02050a; color: #fff; font-family: 'Inter', sans-serif; 
            overflow: hidden; display: flex; flex-direction: column; 
            height: 100vh; justify-content: space-between; 
        }
        
        /* TOPO: Informações Fixas */
        .top-hud { 
            position: relative; z-index: 10; background: rgba(10,15,30,0.85); 
            backdrop-filter: blur(10px); padding: 15px; border-bottom: 1px solid rgba(0,255,179,0.2); 
            text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .badge { font-size: 0.65rem; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .title { font-size: 1.3rem; font-weight: 800; color: #00ffb3; text-transform: uppercase; margin-bottom: 8px; transition: color 0.3s; }
        .desc { font-size: 0.85rem; color: #a0aabf; line-height: 1.4; max-width: 500px; margin: 0 auto; }
        
        /* MEIO: Onde o 3D vai girar */
        .middle-space { 
            flex-grow: 1; position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; z-index: 0; 
        }
        
        /* Iframe para o Cérebro 3D (ex: Sketchfab) */
        .middle-space iframe {
            width: 100%; height: 100%; border: none;
        }

        /* BASE: Controles Fixos */
        .bottom-hud { 
            position: relative; z-index: 10; padding: 15px; 
            background: linear-gradient(to top, #02050a 80%, transparent); 
            display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; 
            border-top: 1px solid rgba(255,255,255,0.05); margin-top: auto;
        }
        .bottom-hud::-webkit-scrollbar { display: none; }
        
        .btn-sys { 
            flex: 1; min-width: 105px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px 10px; 
            border-radius: 12px; font-size: 0.75rem; font-weight: 700; text-align: center; 
            cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; 
            align-items: center; gap: 6px; 
        }
        .btn-sys.active { transform: translateY(-4px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    
    <div class="middle-space">
        <iframe title="Human Brain" id="modelo-3d" src="https://sketchfab.com/models/0d75a13be4f54e6097e3350af0bc3fa7/embed?autostart=1&ui_infos=0&ui_controls=0&ui_stop=0&ui_watermark=0&transparent=1" allow="autoplay; fullscreen; xr-spatial-tracking" execution-while-out-of-viewport execution-while-not-rendered web-share></iframe>
    </div>

    <div class="top-hud">
        <div class="badge">MÓDULO ANATÔMICO 3D</div>
        <div class="title" id="info-title">CÉREBRO HUMANO</div>
        <div class="desc" id="info-desc">Arraste a tela para girar o modelo 3D em 360 graus e aproxime para ver os detalhes.</div>
    </div>

    <div class="bottom-hud">
        <div class="btn-sys active" id="btn-nervous" onclick="changeSystem('cerebro', this)"><span style="font-size:1.4rem">🧠</span> Cérebro 3D</div>
        <div class="btn-sys" onclick="changeSystem('olho', this)"><span style="font-size:1.4rem">👁️</span> Olho Humano</div>
        <div class="btn-sys" onclick="changeSystem('coracao', this)"><span style="font-size:1.4rem">🫀</span> Coração</div>
    </div>

    <script>
        const anatomyData = {
            cerebro: { 
                title: "CÉREBRO HUMANO", 
                color: "#0096ff", 
                desc: "Arraste a tela para girar o modelo 3D. A central de processamento do nosso corpo.", 
                url3d: "https://sketchfab.com/models/0d75a13be4f54e6097e3350af0bc3fa7/embed?autostart=1&ui_infos=0&ui_controls=0&ui_stop=0&ui_watermark=0&transparent=1" 
            },
            olho: { 
                title: "ANATOMIA OCULAR", 
                color: "#ffc800", 
                desc: "Arraste a tela para girar. O globo ocular e suas estruturas complexas de captação de luz.", 
                url3d: "https://sketchfab.com/models/8fc5bc5cce924bf2bdabf945cf45a191/embed?autostart=1&ui_infos=0&ui_controls=0&ui_stop=0&ui_watermark=0&transparent=1" 
            },
            coracao: { 
                title: "CORAÇÃO (BOMBEAMENTO)", 
                color: "#ff3232", 
                desc: "Gire para ver as válvulas e ventrículos. O motor incansável do sistema circulatório.", 
                url3d: "https://sketchfab.com/models/97b2046554dc4cd4a383815e1cb2f57b/embed?autostart=1&ui_infos=0&ui_controls=0&ui_stop=0&ui_watermark=0&transparent=1" 
            }
        };

        function changeSystem(k, btn) {
            document.querySelectorAll('.btn-sys').forEach(b => {
                b.classList.remove('active');
                b.style.borderColor = 'rgba(255,255,255,0.1)';
                b.style.color = '#fff';
            });
            
            const d = anatomyData[k]; 
            
            btn.classList.add('active');
            btn.style.borderColor = d.color;
            btn.style.color = d.color;
            
            document.getElementById('info-title').innerText = d.title; 
            document.getElementById('info-title').style.color = d.color;
            document.getElementById('info-desc').innerText = d.desc;

            document.getElementById('modelo-3d').src = d.url3d;
        }
    </script>
</body>
</html>
